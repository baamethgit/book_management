<div class="categories-container">
  <div class="header">
    <h1>Mes Catégories</h1>
    <div class="actions">
      <button class="btn-secondary" (click)="goBack()">Retour</button>
      <button class="btn-primary" (click)="showAddForm()">Nouvelle Catégorie</button>
    </div>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="loading" class="loading">
    Chargement...
  </div>

  <!-- Formulaire -->
  <div *ngIf="showForm" class="form-card">
    <h3>{{ editingId ? 'Modifier' : 'Ajouter' }} une catégorie</h3>
    
    <div class="form-group">
      <label>Nom *</label>
      <input 
        type="text" 
        [(ngModel)]="name" 
        placeholder="Nom de la catégorie"
        class="form-input">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea 
        [(ngModel)]="description" 
        placeholder="Description (optionnel)"
        class="form-textarea"
        rows="3"></textarea>
    </div>

    <div class="form-actions">
      <button class="btn-secondary" (click)="cancelForm()">Annuler</button>
      <button class="btn-primary" (click)="saveCategory()">
        {{ editingId ? 'Modifier' : 'Créer' }}
      </button>
    </div>
  </div>

  <!-- Liste des catégories -->
  <div class="categories-grid" *ngIf="!loading">
    <div *ngIf="categories.length === 0" class="empty-state">
      <p>Aucune catégorie trouvée</p>
      <button class="btn-primary" (click)="showAddForm()">Créer votre première catégorie</button>
    </div>

    <div *ngFor="let category of categories" class="category-card">
      <div class="category-header">
        <h3 class="category-name">{{ category.name }}</h3>
        <div class="category-actions">
          <button class="btn-edit" (click)="editCategory(category)" title="Modifier">
            ✏️
          </button>
          <button class="btn-delete" (click)="deleteCategory(category)" title="Supprimer">
            🗑️
          </button>
        </div>
      </div>
      
      <p class="category-description" *ngIf="category.description">
        {{ category.description }}
      </p>
      <p class="category-description no-description" *ngIf="!category.description">
        Aucune description
      </p>
    </div>
  </div>
</div>
